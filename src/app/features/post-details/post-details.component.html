<section class="mx-auto max-w-3xl px-3 py-4 md:px-6 md:py-6">
  <a
    routerLink="/feed"
    class="group inline-flex items-center gap-2 rounded-full border border-white/10 bg-white/5 px-3 py-1.5 text-sm font-semibold text-violet-200 transition hover:border-violet-400/40 hover:bg-violet-500/10"
  >
    <i class="fa-solid fa-arrow-left text-xs transition group-hover:-translate-x-0.5"></i>
    Back to feed
  </a>

  @if (postDetails) {
    <article
      class="mt-5 rounded-3xl border border-white/10 bg-white/[0.06] p-5 shadow-2xl shadow-black/35 backdrop-blur-2xl md:p-7"
    >
      <header class="mb-4 flex items-start justify-between gap-3">
        <div class="flex items-center gap-3">
          <img
            [src]="postDetails.user.photo || '/assets/avatar.png'"
            [alt]="postDetails.user.name"
            class="size-12 shrink-0 rounded-2xl object-cover ring-2 ring-violet-500/30"
          />
          <div>
            <h1 class="text-base font-extrabold leading-tight text-slate-50 md:text-lg">
              {{ postDetails.user.name }}
            </h1>
            <div class="mt-0.5 flex flex-wrap items-center gap-x-2 gap-y-1 text-xs text-slate-400 md:text-sm">
              <span class="font-medium text-violet-200/90">@{{ postDetails.user.username }}</span>
              <span class="text-slate-600">&middot;</span>
              <time class="text-slate-500">{{ postDetails.createdAt | date: 'medium' }}</time>
            </div>
          </div>
        </div>
      </header>

      @if (postDetails.body) {
        <p class="text-[15px] leading-relaxed text-slate-100 md:text-base">{{ postDetails.body }}</p>
      }

      @if (postDetails.image) {
        <img
          [src]="postDetails.image"
          class="mt-4 max-h-[520px] w-full rounded-2xl object-cover ring-1 ring-white/10"
          alt=""
        />
      }

      <div class="mt-5" (click)="$event.stopPropagation()">
        <app-post-engagement-bar
          [post]="postDetails"
          [userId]="userId"
          (postUpdated)="postDetails = $event"
          (openLikers)="likesForPostId = $event"
          (openEditor)="editingPost = $event"
          (needRefresh)="getPostDetails()"
        >
          <a
            slot="comment"
            href="#comments-section"
            class="flex flex-1 cursor-pointer items-center justify-center gap-2 rounded-xl py-2.5 text-[14px] font-semibold text-slate-400 transition hover:bg-white/10 hover:text-slate-100"
          >
            <i class="fa-regular fa-message text-lg"></i>
            Comments
          </a>
        </app-post-engagement-bar>
      </div>

      <div id="comments-section" class="mt-6 border-t border-white/10 pt-5">
        <app-post-comments
          [postId]="postId"
          [userId]="userId"
          [userPhoto]="(postDetails.user.photo) || '/assets/avatar.png'"
        ></app-post-comments>
      </div>
    </article>
  } @else {
    <p class="mt-8 text-center text-sm text-slate-500">Loading post…</p>
  }
</section>

<app-post-likes-modal [postId]="likesForPostId" (closed)="closeLikes()"></app-post-likes-modal>
<app-edit-post-dialog [post]="editingPost" (closed)="closeEditor()" (saved)="onEdited($event)"></app-edit-post-dialog>
