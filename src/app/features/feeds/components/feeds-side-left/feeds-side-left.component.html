<aside
  class="sticky top-24 flex w-full flex-col gap-1 rounded-3xl border border-white/10 bg-white/[0.05] p-2.5 text-sm shadow-xl shadow-black/20 backdrop-blur-xl"
  aria-label="Sidebar Navigation"
>
  <button
    type="button"
    (click)="setTimeline('all', 'feed-all')"
    class="flex items-center gap-3 rounded-2xl p-2.5 font-semibold transition"
    [class]="selected === 'feed-all'
      ? 'bg-gradient-to-r from-violet-500/25 to-fuchsia-500/15 text-white ring-1 ring-white/15'
      : 'text-slate-300 hover:bg-white/10 hover:text-slate-100'"
  >
    <i class="fa-regular fa-newspaper w-5 text-center text-violet-300"></i>
    <span>Feed</span>
  </button>

  <button
    type="button"
    (click)="setTimeline('me', 'feed-me')"
    class="flex items-center gap-3 rounded-2xl p-2.5 font-semibold transition"
    [class]="selected === 'feed-me'
      ? 'bg-gradient-to-r from-violet-500/25 to-fuchsia-500/15 text-white ring-1 ring-white/15'
      : 'text-slate-300 hover:bg-white/10 hover:text-slate-100'"
  >
    <i class="fa-solid fa-wand-magic-sparkles w-5 text-center text-cyan-300"></i>
    <span>My posts</span>
  </button>

  <button
    type="button"
    (click)="setTimeline('following', 'feed-following')"
    class="flex items-center gap-3 rounded-2xl p-2.5 font-semibold transition"
    [class]="selected === 'feed-following'
      ? 'bg-gradient-to-r from-violet-500/25 to-fuchsia-500/15 text-white ring-1 ring-white/15'
      : 'text-slate-300 hover:bg-white/10 hover:text-slate-100'"
  >
    <i class="fa-solid fa-user-group w-5 text-center text-fuchsia-300"></i>
    <span>Following</span>
  </button>

  <button
    type="button"
    (click)="setExplore()"
    class="flex items-center gap-3 rounded-2xl p-2.5 font-semibold transition"
    [class]="selected === 'explore'
      ? 'bg-gradient-to-r from-violet-500/25 to-fuchsia-500/15 text-white ring-1 ring-white/15'
      : 'text-slate-300 hover:bg-white/10 hover:text-slate-100'"
  >
    <i class="fa-solid fa-compass w-5 text-center text-emerald-300"></i>
    <span>Discover</span>
  </button>

  <button
    type="button"
    (click)="setBookmarks()"
    class="flex items-center gap-3 rounded-2xl p-2.5 font-semibold transition"
    [class]="selected === 'bookmarks'
      ? 'bg-gradient-to-r from-violet-500/25 to-fuchsia-500/15 text-white ring-1 ring-white/15'
      : 'text-slate-300 hover:bg-white/10 hover:text-slate-100'"
  >
    <i class="fa-regular fa-bookmark w-5 text-center text-amber-300"></i>
    <span>Saved</span>
  </button>
</aside>
