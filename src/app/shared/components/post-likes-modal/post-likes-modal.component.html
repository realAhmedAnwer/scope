@if (postId) {
  <div
    class="fixed inset-0 z-[100] flex items-end justify-center bg-black/60 p-4 sm:items-center"
    (click)="close()"
    role="dialog"
    aria-modal="true"
    aria-label="People who liked this post"
  >
    <div
      class="max-h-[85vh] w-full max-w-md overflow-hidden rounded-3xl border border-white/10 bg-slate-950/95 shadow-2xl backdrop-blur-xl"
      (click)="$event.stopPropagation()"
    >
      <div class="flex items-center justify-between border-b border-white/10 px-4 py-3">
        <h2 class="text-lg font-extrabold text-white">Likes</h2>
        <button
          type="button"
          (click)="close()"
          class="rounded-xl p-2 text-slate-400 hover:bg-white/10 hover:text-white"
          aria-label="Close"
        >
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <ul class="max-h-[60vh] overflow-y-auto p-2">
        @for (u of users; track u._id ?? u.id) {
          <li class="flex items-center gap-3 rounded-2xl px-2 py-2 hover:bg-white/5">
            <img
              class="h-10 w-10 rounded-2xl object-cover ring-1 ring-white/10"
              [src]="u.photo || u.user?.photo || '/assets/avatar.png'"
              [alt]="u.name || u.user?.name || 'user'"
            />
            <div class="min-w-0">
              <div class="truncate font-bold text-slate-100">{{ u.name || u.user?.name }}</div>
              <div class="truncate text-sm text-slate-500">
                @{{ u.username || u.user?.username }}
              </div>
            </div>
          </li>
        } @empty {
          <li class="px-3 py-8 text-center text-sm text-slate-500">No likes yet.</li>
        }
      </ul>
      @if (hasMore && users.length > 0) {
        <div class="border-t border-white/10 p-3">
          <button
            type="button"
            (click)="loadMore()"
            class="w-full rounded-xl border border-white/15 bg-white/5 py-2 text-sm font-bold text-slate-200 hover:bg-white/10"
          >
            Load more
          </button>
        </div>
      }
    </div>
  </div>
}
