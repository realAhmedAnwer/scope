<div
  class="mb-3 flex flex-wrap items-center justify-between gap-2 px-0.5 text-[13px] text-slate-400"
>
  <button
    type="button"
    (click)="showLikes()"
    class="flex cursor-pointer items-center gap-1.5 text-left hover:text-violet-200"
  >
    <span
      class="flex h-6 w-6 items-center justify-center rounded-full bg-gradient-to-br from-violet-500 to-fuchsia-500 text-[10px] text-white"
    >
      <i class="fa-solid fa-thumbs-up"></i>
    </span>
    <span>{{ post.likesCount }} {{ 'POST.LIKES' | translate }}</span>
  </button>
  <div class="flex flex-wrap items-center gap-3">
    <span class="text-slate-500">{{ post.sharesCount }} {{ 'POST.SHARES' | translate }}</span>
    <span class="text-slate-500">{{ post.commentsCount }} {{ 'POST.COMMENTS_LOWER' | translate }}</span>
  </div>
</div>

<div class="border-t border-white/10"></div>

<div class="flex items-stretch py-1">
  <button
    type="button"
    (click)="like()"
    class="flex flex-1 cursor-pointer items-center justify-center gap-2 rounded-xl py-2.5 text-[14px] font-semibold transition hover:bg-white/10"
    [class.text-violet-300]="isLiked()"
    [class.text-slate-400]="!isLiked()"
  >
    <i class="fa-regular fa-thumbs-up text-lg"></i>
    {{ 'POST.LIKE' | translate }}
  </button>

  <ng-content select="[slot=comment]"></ng-content>

  <button
    type="button"
    (click)="share()"
    class="flex flex-1 cursor-pointer items-center justify-center gap-2 rounded-xl py-2.5 text-[14px] font-semibold text-slate-400 transition hover:bg-white/10 hover:text-slate-100"
  >
    <i class="fa-solid fa-share text-lg"></i>
    {{ 'POST.SHARE' | translate }}
  </button>
</div>

<div class="mt-1 flex flex-wrap gap-2 border-t border-white/10 px-1 pt-2">
  @if (post.user._id === userId) {
    <button
      type="button"
      (click)="edit()"
      class="rounded-lg px-2 py-1 text-xs font-semibold text-violet-300 hover:bg-white/10"
    >
      <i class="fa-regular fa-pen-to-square me-1"></i>{{ 'POST.EDIT' | translate }}
    </button>
  }
  <button
    type="button"
    (click)="bookmark()"
    class="rounded-lg px-2 py-1 text-xs font-semibold hover:bg-white/10"
    [class.text-amber-300]="post.bookmarked"
    [class.text-slate-400]="!post.bookmarked"
  >
    <i class="fa-{{ post.bookmarked ? 'solid' : 'regular' }} fa-bookmark me-1"></i>
    {{ post.bookmarked ? ('POST.SAVED' | translate) : ('POST.SAVE' | translate) }}
  </button>
</div>
