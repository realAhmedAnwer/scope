<div
  class="flex items-center rounded-xl border border-white/10 bg-slate-950/50 p-1 backdrop-blur-sm shadow-inner transition-all"
>
  <button
    type="button"
    (click)="updateLanguage('en')"
    [class]="
      currentLanguage === 'en'
        ? 'bg-white/10 text-white shadow-sm ring-1 ring-white/10'
        : 'text-slate-400 hover:text-slate-200 hover:bg-white/5'
    "
    class="rounded-lg px-3 py-1.5 text-xs font-bold transition-all"
  >
    {{ 'LANG.EN' | translate }}
  </button>
  <button
    type="button"
    (click)="updateLanguage('ar')"
    [class]="
      currentLanguage === 'ar'
        ? 'bg-white/10 text-white shadow-sm ring-1 ring-white/10'
        : 'text-slate-400 hover:text-slate-200 hover:bg-white/5'
    "
    class="rounded-lg px-3 py-1.5 text-xs font-bold transition-all"
  >
    {{ 'LANG.AR' | translate }}
  </button>
</div>
