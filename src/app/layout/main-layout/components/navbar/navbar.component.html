<nav
  class="sticky top-0 z-50 border-b border-white/10 bg-slate-950/55 shadow-lg shadow-black/20 backdrop-blur-xl"
>
  <div class="mx-auto flex max-w-screen-xl flex-wrap items-center justify-between gap-3 px-3 py-3 md:px-5">
    <a class="flex items-center gap-3 rtl:space-x-reverse" routerLink="/feed">
      <img src="/assets/scope.png" class="h-9 rounded-lg ring-1 ring-white/15" alt="Scope Logo" />
      <span class="bg-gradient-to-r from-violet-200 to-cyan-200 bg-clip-text text-xl font-extrabold tracking-tight text-transparent"
        >Scope</span
      >
    </a>

    <div class="flex items-center gap-2 md:order-2 md:gap-3">
      <button
        type="button"
        class="flex rounded-full bg-white/5 p-0.5 ring-1 ring-white/10 transition hover:bg-white/10"
        id="user-menu-button"
        aria-expanded="false"
        data-dropdown-toggle="user-dropdown"
        data-dropdown-placement="bottom"
      >
        <span class="sr-only">Open user menu</span>
        <img class="h-9 w-9 rounded-full object-cover" [src]="photo || '/assets/avatar.png'" alt="avatar" />
      </button>

      <div
        class="z-50 hidden w-48 rounded-2xl border border-white/10 bg-slate-950/95 shadow-2xl shadow-black/50 backdrop-blur-xl"
        id="user-dropdown"
      >
        <div class="border-b border-white/10 px-4 py-3 text-sm">
          <span class="block truncate font-semibold text-slate-100">{{ userName }}</span>
        </div>
        <ul class="p-2 text-sm font-medium text-slate-300" aria-labelledby="user-menu-button">
          <li>
            <a
              routerLink="/reset-password"
              routerLinkActive="bg-violet-500/15 text-violet-200"
              class="inline-flex w-full items-center gap-2 rounded-xl p-2.5 transition hover:bg-white/10 hover:text-slate-100"
            >
              <i class="fa-solid fa-gear w-5 text-center text-violet-300"></i> Settings</a
            >
          </li>
          <li>
            <button
              type="button"
              (click)="logout()"
              class="inline-flex w-full cursor-pointer items-center gap-2 rounded-xl p-2.5 text-left transition hover:bg-white/10 hover:text-slate-100"
            >
              <i class="fa-solid fa-arrow-right-from-bracket w-5 text-center text-rose-300"></i>
              Log out
            </button>
          </li>
        </ul>
      </div>

      <button
        data-collapse-toggle="navbar-user"
        type="button"
        class="inline-flex h-10 w-10 items-center justify-center rounded-xl border border-white/10 text-slate-200 md:hidden hover:bg-white/10"
        aria-controls="navbar-user"
        aria-expanded="false"
      >
        <span class="sr-only">Open main menu</span>
        <svg class="h-5 w-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="M5 7h14M5 12h14M5 17h14" />
        </svg>
      </button>
    </div>

    <div class="hidden w-full md:order-1 md:flex md:w-auto" id="navbar-user">
      <ul
        class="mt-3 flex flex-col gap-1 rounded-2xl border border-white/10 bg-white/[0.04] p-2 font-semibold md:mt-0 md:flex-row md:gap-1 md:border-0 md:bg-transparent md:p-0"
      >
        <li>
          <a
            routerLink="/feed"
            routerLinkActive="bg-gradient-to-r from-violet-500/35 to-fuchsia-500/25 text-white shadow-lg shadow-violet-500/10 ring-1 ring-white/10"
            [routerLinkActiveOptions]="{ exact: false }"
            class="flex items-center gap-2 rounded-xl px-4 py-2.5 text-slate-300 transition hover:bg-white/10 hover:text-slate-100 md:py-2"
            aria-current="page"
          >
            <i class="fa-regular fa-house w-5 text-center text-violet-300"></i> Feed</a
          >
        </li>
        <li>
          <a
            routerLink="/profile"
            routerLinkActive="bg-gradient-to-r from-violet-500/35 to-fuchsia-500/25 text-white shadow-lg shadow-violet-500/10 ring-1 ring-white/10"
            class="flex items-center gap-2 rounded-xl px-4 py-2.5 text-slate-300 transition hover:bg-white/10 hover:text-slate-100 md:py-2"
            aria-current="page"
          >
            <i class="fa-regular fa-user w-5 text-center text-cyan-300"></i> Profile</a
          >
        </li>
        <li>
          <a
            routerLink="/notifications"
            routerLinkActive="bg-gradient-to-r from-violet-500/35 to-fuchsia-500/25 text-white shadow-lg shadow-violet-500/10 ring-1 ring-white/10"
            class="flex items-center gap-2 rounded-xl px-4 py-2.5 text-slate-300 transition hover:bg-white/10 hover:text-slate-100 md:py-2"
            aria-current="page"
          >
            <i class="fa-regular fa-comment w-5 text-center text-fuchsia-300"></i>
            Notifications
            @if (unreadCount > 0) {
              <span
                class="ms-1 inline-flex min-h-5 min-w-5 items-center justify-center rounded-full bg-gradient-to-r from-rose-500 to-orange-500 px-1.5 text-[11px] font-bold text-white"
                >{{ unreadCount }}</span
              >
            }
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>
